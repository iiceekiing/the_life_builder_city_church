services:
  - type: web
    name: life-builders-api
    env: python
    plan: free
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: python start_server.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: life-builders-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["https://the-life-builder-city-church.vercel.app","https://localhost:3000","https://localhost:5173"]'

databases:
  - name: life-builders-db
    plan: free
