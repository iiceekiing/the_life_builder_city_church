services:
  - type: web
    name: life-builders-api
    env: python
    plan: free
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: life-builders-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend-url.vercel.app,https://localhost:3000

databases:
  - name: life-builders-db
    plan: free
